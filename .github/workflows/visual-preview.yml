name: Visual Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: kamegoro/frameshot@v0.9.2
        with:
          paths: "./frontend/src/_components/**/*.tsx"
          exclude: "*.test.*,*.spec.*,*.stories.*"
